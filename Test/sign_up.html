<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Sign Up</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #2258a8;
        }
        .container{
            width: 400px;
            background: rgb(132, 155, 254);
            margin: 50px auto;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(4, 31, 236, 0.1);
        }
        h2{
            text-align: center;
            color: #26f218;
        }
        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #16e3a5;
            border-radius: 10px;
            outline: none;
            color: rgb(7, 76, 202);
            background-color: #aee4fb;
        }
        .gender{
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .gender label{
            width: 32%;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            background: rgb(62, 178, 245);
            margin: 10px;

        }
        button{
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: #42b72a;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background-color: #066438;
        }
        label{
            color:rgb(13, 14, 13);
            font-weight: 400px;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Create New Account</h2>

        <form action="sign_up.php" method="POST">

            <label for="">First Name</label><br>
            <input  type="text" name="firstname" placeholder="First name" required><br>
            <label for="">Last Name</label><br>
            <input type="text" name="lastname" placeholder="Last name" required><br>
            <label for="">E-mail</label><br>
            <input type="email" name="email" placeholder="Mobile number or email" required><br>
            <label for="">Password</label><br>
            <input type="password" name="password" placeholder="New password" required><br>

            <label>Date of Birth:</label>
            <input type="date" name="dateofbirth" required>

            <label>Gender:</label>
            <div class="gender">
                <label><input type="radio" name="gender" value="Male">Male</label>
                <label><input type="radio" name="gender" value="Female">Female</label>
                <label><input type="radio" name="gender" value="Custom">Custom</label>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>

</body>
</html>
