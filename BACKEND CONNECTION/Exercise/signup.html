<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        :root {
            --primary: #2a62ff;
            --background: #f3f6ff;
            --card: #ffffff;
            --text: #1c1c27;
            --muted: #575d6a;

            --shadow: 0 10px 30px rgba(0,0,0,0.08);

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background: radial-gradient(circle at top, #dbe7ff, var(--background));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .container {
            width: min(420px, 100%);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 10px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(42, 98, 255, 0.18);
        }

        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .button:hover {
            background: #1e4ad8;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .message {
            background: rgba(255, 76, 66, 0.12);

            padding: 12px;
            border-radius: 10px;

        }

        .success {

<body>
    <main class="container">
        <section class="brand">
            <h1>Create Account</h1>
            <p>Sign up to get started.</p>
        </section>
    
        <form method="POST" action="signup_db.php">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" name="submit" class="button">Sign Up</button>
        </form>

        <div class="footer">
            <span>Already have an account?</span>
            <a href="login.php">Login</a>
        </div>
    </main>
